name: Backup leaderboard

# 每 4 小时把线上排行榜快照提交到仓库(git 历史 = 带时间戳的版本备份)。
# 万一免费后端清空/丢数据,可从 backups/leaderboard-latest.json 或任一历史提交恢复。
on:
  schedule:
    - cron: "23 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lb-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch & snapshot leaderboard
        run: |
          URL="https://api.restful-api.dev/objects/ff8081819d82fab6019ef0c35c6b4ad5"
          RESP=$(curl -fsS --max-time 30 "$URL" || true)
          if [ -z "$RESP" ]; then echo "fetch failed/empty — skip (keep last good backup)"; exit 0; fi
          # 必须包含 scores 字段才算有效,避免用坏数据覆盖好备份
          echo "$RESP" | grep -q '"scores"' || { echo "no scores field — skip"; exit 0; }
          mkdir -p backups
          printf '%s\n' "$RESP" > backups/leaderboard-latest.json
          echo "snapshot saved:"; head -c 400 backups/leaderboard-latest.json; echo
      - name: Commit if changed
        run: |
          git config user.name "plox-backup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backups/leaderboard-latest.json
          if git diff --staged --quiet; then
            echo "no change since last backup"
          else
            git commit -m "chore: leaderboard backup $(date -u +%FT%TZ)"
            git push
          fi
