<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0118" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PLOX" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon.svg" />
<title>PLOX</title>
<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">PLOX</span>
    <div class="topbtns">
      <span class="coins" id="coins" aria-label="Coins"><i class="coin"></i><b id="coinNum">0</b></span>
      <button class="gear" id="pauseBtn" aria-label="Pause"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="5.5" width="3.6" height="13" rx="1.2"/><rect x="13.4" y="5.5" width="3.6" height="13" rx="1.2"/></svg></button>
      <button class="gear" id="gearBtn" aria-label="Settings"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.03-.66-.07-.98l2.11-1.65a.5.5 0 00.12-.64l-2-3.46a.5.5 0 00-.61-.22l-2.49 1a7.3 7.3 0 00-1.69-.98l-.38-2.65A.49.49 0 0013.6 2h-4a.49.49 0 00-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1a.5.5 0 00-.61.22l-2 3.46a.5.5 0 00.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65a.5.5 0 00-.12.64l2 3.46c.14.24.43.34.68.22l2.49-1c.52.39 1.08.73 1.69.98l.38 2.65c.05.24.26.42.49.42h4c.23 0 .44-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.25.12.54.02.68-.22l2-3.46a.5.5 0 00-.12-.64l-2.11-1.65zM12 15.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z"/></svg></button>
    </div>
  </div>

  <div class="hud">
    <div class="stat"><div class="k" data-i18n="score">分数</div><div class="v" id="score">0</div></div>
    <div class="stat"><div class="k" data-i18n="best">最高</div><div class="v" id="high">0</div></div>
    <div class="stat"><div class="k" data-i18n="level">关卡</div><div class="v" id="level">1</div></div>
  </div>

  <div class="stage">
    <div class="boardWrap">
      <canvas id="board"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>
    <div class="side">
      <div class="card">
        <div class="k" data-i18n="next">下一个</div>
        <canvas id="nextCv" width="60" height="170"></canvas>
      </div>
      <div class="card"><div class="k" data-i18n="cleared">消除</div><div class="v" id="cleared">0</div></div>
      <div class="card"><div class="k" data-i18n="combo">连击</div><div class="v" id="maxcombo">0</div></div>
    </div>
  </div>

  <div class="itembar" id="itembar"></div>
  <div class="foot" id="foot">轻点=旋转 · 左右拖=移动 · 向下滑=落地</div>

<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
