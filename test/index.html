<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0118" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PLOX" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon.svg" />
<title>PLOX · 单机版</title>
<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">PLOX</span>
    <div class="topbtns">
      <button class="gear" id="pauseBtn" aria-label="暂停">⏸</button>
      <button class="gear" id="gearBtn" aria-label="设置">⚙</button>
    </div>
  </div>

  <div class="hud">
    <div class="stat"><div class="k">分数</div><div class="v" id="score">0</div></div>
    <div class="stat"><div class="k">最高</div><div class="v" id="high">0</div></div>
    <div class="stat"><div class="k">关卡</div><div class="v" id="level">1</div></div>
  </div>

  <div class="stage">
    <div class="boardWrap">
      <canvas id="board"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>
    <div class="side">
      <div class="card">
        <div class="k">下一个</div>
        <canvas id="nextCv" width="60" height="170"></canvas>
      </div>
      <div class="card"><div class="k">消除</div><div class="v" id="cleared">0</div></div>
      <div class="card"><div class="k">连击</div><div class="v" id="maxcombo">0</div></div>
    </div>
  </div>

  <div class="foot" id="foot">点击=旋转 · 左右滑=移动 · 下滑=速降</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
